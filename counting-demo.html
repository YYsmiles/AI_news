<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI 计数 Demo | 上传图片计数</title>
    <meta name="description" content="上传图片后进行浏览器端计数。支持红/粉/黄花朵颜色计数和通用零样本目标检测计数。" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div>
        <p class="kicker">Browser Counting Demo</p>
        <h1>上传图片计数</h1>
        <p class="subtitle">默认使用离线颜色计数，不需要下载模型。通用目标可切换到零样本检测模式。</p>
      </div>
      <nav>
        <a href="index.html">首页</a>
        <a href="counting.html">计数专题</a>
      </nav>
    </header>

    <main class="page">
      <section class="demo-workbench">
        <div class="demo-controls">
          <label>
            <span>上传图片</span>
            <input id="imageInput" type="file" accept="image/*" />
          </label>
          <label>
            <span>计数模式</span>
            <select id="modeInput">
              <option value="flower">花朵颜色计数（离线，适合红/粉/黄花）</option>
              <option value="detector">通用目标检测（需下载模型）</option>
            </select>
          </label>
          <label id="labelField">
            <span>目标标签（检测模式）</span>
            <input id="labelInput" type="text" value="person, car, dog, flower" />
          </label>
          <label>
            <span>置信度 / 敏感度：<strong id="thresholdValue">0.25</strong></span>
            <input id="thresholdInput" type="range" min="0.05" max="0.8" step="0.05" value="0.25" />
          </label>
          <button class="primary" id="runButton" type="button">开始计数</button>
          <div class="button-row">
            <button class="secondary" id="downloadCsv" type="button" disabled>导出 CSV</button>
            <button class="secondary" id="downloadImage" type="button" disabled>下载标注图</button>
          </div>
          <p class="small-note">说明：颜色计数是近似算法，适合先快速估算。论文级农业计数仍需要 CountGD/P2PNet 等后端模型。</p>
        </div>

        <div class="demo-stage">
          <div class="canvas-wrap">
            <canvas id="canvas" width="960" height="640"></canvas>
          </div>
          <div class="result-panel">
            <p class="kicker">Result</p>
            <h2 id="resultTitle">等待上传图片</h2>
            <div id="countList"></div>
            <div class="result-actions">
              <button class="secondary" id="copyJson" type="button" disabled>复制 JSON</button>
            </div>
            <pre id="rawOutput">结果会显示在这里。</pre>
          </div>
        </div>
      </section>
    </main>

    <script type="module" src="counting-demo.js"></script>
  </body>
</html>
